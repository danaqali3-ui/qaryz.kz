<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qaryz.kz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .hidden { display: none; }
        .active-lang { background: white; font-weight: bold; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">
    <div id="app" class="max-w-md mx-auto min-h-screen p-4">
        
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-xl text-blue-600">Qaryz.kz</span>
            <div class="bg-gray-200 p-1 rounded-lg flex gap-1 text-xs">
                <button id="btn-ru" onclick="setLang('ru')" class="px-3 py-1 rounded-md">RU</button>
                <button id="btn-kz" onclick="setLang('kz')" class="px-3 py-1 rounded-md">KZ</button>
            </div>
        </div>

        <div id="screen-main">
            <h1 id="h1-title" class="text-2xl font-extrabold mb-2 leading-tight"></h1>
            <p id="p-subtitle" class="text-gray-600 mb-8 text-[15px]"></p>
            <p id="p-choose" class="font-bold text-sm mb-4 text-slate-500 uppercase tracking-wide"></p>
            <div id="main-options" class="space-y-3"></div>
            <div class="mt-10 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <p id="p-footer" class="text-[11px] text-blue-800 text-center leading-relaxed font-medium"></p>
            </div>
        </div>

        <div id="screen-audit" class="hidden">
            <button onclick="showScreen('main')" class="text-blue-600 mb-6 text-sm font-bold flex items-center gap-1">← Артқа / Назад</button>
            <h2 id="audit-header" class="text-xl font-bold mb-6"></h2>
            
            <div class="space-y-5 bg-white p-6 rounded-[32px] shadow-sm border border-gray-100">
                <div>
                    <label id="l-sum" class="block text-sm font-bold text-slate-700 mb-2"></label>
                    <input type="number" id="in-sum" placeholder="0" class="w-full bg-gray-50 border-0 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label id="l-date" class="block text-sm font-bold text-slate-700 mb-2"></label>
                    <input type="text" id="in-date" placeholder="ДД.ММ.ГГГГ" class="w-full bg-gray-50 border-0 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label id="l-end" class="block text-sm font-bold text-slate-700 mb-2"></label>
                    <input type="text" id="in-end" placeholder="ДД.ММ.ГГГГ" class="w-full bg-gray-50 border-0 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label id="l-pay" class="block text-sm font-bold text-slate-700 mb-2"></label>
                    <input type="number" id="in-pay" placeholder="0" class="w-full bg-gray-50 border-0 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label id="l-remain" class="block text-sm font-bold text-slate-700 mb-2"></label>
                    <input type="number" id="in-remain" placeholder="0" class="w-full bg-gray-50 border-0 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button id="btn-calc" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl mt-4 shadow-lg active:scale-95 transition text-lg"></button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const content = {
            ru: {
                title: "Возьмите кредиты под контроль",
                subtitle: "Как уменьшить переплату, остановить штрафы и действовать при аресте счетов.",
                choose: "Выберите ситуацию:",
                footer: "Мы не запрашиваем ИИН, номер телефона, данные банковских карт и коды подтверждения.",
                audit_h: "Аудит и Анализ",
                l_sum: "Сумма кредита",
                l_date: "Дата получения",
                l_end: "Дата окончания по графику",
                l_pay: "Ежемесячный платеж",
                l_remain: "Остаток основного долга",
                btn_calc: "Провести анализ",
                options: [
                    { id: 'audit', text: "Как уменьшить переплату по кредиту" },
                    { id: '9', text: "Стало сложно оплачивать кредиты" },
                    { id: 'delay', text: "Уже есть просрочка" },
                    { id: 'arrest', text: "Арестовали счета" },
                    { id: 'coll', text: "Звонят коллекторы" }
                ]
            },
            kz: {
                title: "Несиелеріңізді бақылауға алыңыз",
                subtitle: "Артық төлемді қалай азайтуға, айыппұлдарды тоқтатуға және шоттар бұғатталған кезде не істеу керектігін біліңіз.",
                choose: "Тиісті нұсқаны таңдаңыз:",
                footer: "Біз ЖСН, телефон нөмірін, банк карталарының деректерін және растау кодтарын сұрамаймыз.",
                audit_h: "Аудит және талдау",
                l_sum: "Несие сомасы",
                l_date: "Алынған күні",
                l_end: "График бойынша аяқталу күні",
                l_pay: "Ай сайынғы төлем",
                l_remain: "Негізгі қарыздың қалдығы",
                btn_calc: "Талдау жүргізу",
                options: [
                    { id: 'audit', text: "Несие бойынша артық төлемді қалай азайтуға болады" },
                    { id: '9', text: "Қаржылық қиындықтар туындады" },
                    { id: 'delay', text: "Мерзімі өткен берешек бар" },
                    { id: 'arrest', text: "Шоттарға бұғат қойылды" },
                    { id: 'coll', text: "Коллекторлар хабарласып жатыр" }
                ]
            }
        };

        function showScreen(id) {
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-audit').classList.add('hidden');
            document.getElementById('screen-' + id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function setLang(lang) {
            const t = content[lang];
            document.getElementById('h1-title').innerText = t.title;
            document.getElementById('p-subtitle').innerText = t.subtitle;
            document.getElementById('p-choose').innerText = t.choose;
            document.getElementById('p-footer').innerText = t.footer;
            
            document.getElementById('audit-header').innerText = t.audit_h;
            document.getElementById('l-sum').innerText = t.l_sum;
            document.getElementById('l-date').innerText = t.l_date;
            document.getElementById('l-end').innerText = t.l_end;
            document.getElementById('l-pay').innerText = t.l_pay;
            document.getElementById('l-remain').innerText = t.l_remain;
            document.getElementById('btn-calc').innerText = t.btn_calc;

            const list = document.getElementById('main-options');
            list.innerHTML = '';
            t.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "w-full text-left bg-white border border-gray-100 p-5 rounded-[24px] shadow-sm flex justify-between items-center text-[15px] font-semibold active:bg-gray-50";
                b.innerHTML = `<span>${opt.text}</span><span class="text-blue-200">→</span>`;
                b.onclick = () => { if(opt.id === 'audit') showScreen('audit'); else alert(opt.text); };
                list.appendChild(b);
            });

            document.getElementById('btn-ru').className = lang === 'ru' ? 'px-4 py-1.5 rounded-md active-lang' : 'px-4 py-1.5 rounded-md text-gray-500';
            document.getElementById('btn-kz').className = lang === 'kz' ? 'px-4 py-1.5 rounded-md active-lang' : 'px-4 py-1.5 rounded-md text-gray-500';
        }

        setLang('ru');
    </script>
</body>
</html>
